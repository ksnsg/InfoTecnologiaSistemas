version: "3.9"

# ─────────────────────────────────────────────────────────────────
# Named volumes – guarantee data persistence across container
# restarts without leaking state into the host filesystem.
# ─────────────────────────────────────────────────────────────────
volumes:
  sqlserver_data:
  redis_data:
  rabbitmq_data:
  mongodb_data:

# ─────────────────────────────────────────────────────────────────
# Single isolated bridge network.  No service is reachable from
# the host unless an explicit `ports` mapping is declared.
# ─────────────────────────────────────────────────────────────────
networks:
  aivacol_network:
    driver: bridge

services:

  # ───────────────────────────────────────────────────────────────
  # app – Node.js application (Epic 0: infrastructure only)
  # Source code is bind-mounted so hot-reload works in dev.
  # ───────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    user: "1000:1000"
    container_name: aivacol_app
    restart: unless-stopped
    env_file: .env
    volumes:
      - .:/app
      # Preserve the container's node_modules; do not overwrite
      # them with the host directory (which may be empty or differ).
      - /app/node_modules
    ports:
      - "${APP_PORT:-3000}:3000"
    networks:
      - aivacol_network
    # Overrides the Dockerfile CMD placeholder.
    # start:dev launches both the HTTP REST API and the RabbitMQ microservice
    # consumer in a single hybrid NestJS process with hot-reload (--watch).
    command: /bin/sh -c "while ! nc -z sqlserver 1433; do sleep 2; done; npm run start:dev"
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      mongodb:
        condition: service_healthy

  # ───────────────────────────────────────────────────────────────
  # sqlserver – Microsoft SQL Server 2022 Developer Edition
  # ───────────────────────────────────────────────────────────────
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: aivacol_sqlserver
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: Developer
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}
    command: >
      bash -c "/opt/mssql/bin/sqlservr & 
      sleep 30s && 
      /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P '${MSSQL_SA_PASSWORD}' -No -Q 'IF NOT EXISTS (SELECT * FROM sys.databases WHERE name = \"aivacol_db\") CREATE DATABASE aivacol_db' && 
      tail -f /dev/null"
    volumes:
      - sqlserver_data:/var/opt/mssql
    ports:
      - "${MSSQL_PORT:-1433}:1433"
    networks:
      - aivacol_network
    healthcheck:
      # /opt/mssql-tools18 is the path in the 2022 image; -No is required
      # because the image ships a self-signed TLS cert in dev mode.
      test:
        - CMD-SHELL
        - |
          /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa \
            -P "$$MSSQL_SA_PASSWORD" -No -Q "SELECT 1" > /dev/null 2>&1
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 30s

  # ───────────────────────────────────────────────────────────────
  # redis – In-memory cache (mandatory for the project test)
  # ───────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: aivacol_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-redispassword}
      --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - aivacol_network
    healthcheck:
      test:
        - CMD
        - redis-cli
        - -a
        - ${REDIS_PASSWORD:-redispassword}
        - ping
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ───────────────────────────────────────────────────────────────
  # rabbitmq – Message broker with management UI
  # Web UI reachable at http://localhost:15672
  # ───────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: aivacol_rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-aivacol}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-rabbitpassword}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-aivacol_vhost}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "${RABBITMQ_AMQP_PORT:-5672}:5672"
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"
    networks:
      - aivacol_network
    healthcheck:
      test:
        - CMD
        - rabbitmq-diagnostics
        - -q
        - ping
      interval: 15s
      timeout: 10s
      retries: 6
      start_period: 20s

  # ───────────────────────────────────────────────────────────────
  # mongodb – Non-relational store for audit logging
  # ───────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: aivacol_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-aivacol}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-mongopassword}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-aivacol_audit}
    volumes:
      - mongodb_data:/data/db
    ports:
      - "${MONGO_PORT:-27017}:27017"
    networks:
      - aivacol_network
    healthcheck:
      test:
        - CMD
        - mongosh
        - --eval
        - "db.adminCommand('ping')"
        - --quiet
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s
