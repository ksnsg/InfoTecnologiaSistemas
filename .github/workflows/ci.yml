name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Unit & E2E Tests
    runs-on: ubuntu-latest

    env:
      NODE_ENV: test
      # Dummy values — only satisfy fail-fast guards during module bootstrap.
      # No real infrastructure runs in CI; all I/O is mocked via AppTestBootstrapper.
      JWT_SECRET: ci-test-secret-do-not-use-in-production
      MSSQL_SA_PASSWORD: ci-dummy-password
      MSSQL_HOST: localhost
      MSSQL_PORT: 1433
      MSSQL_USER: sa
      MSSQL_DB: ci_db
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      REDIS_PASSWORD: ci-dummy
      RABBITMQ_HOST: localhost
      RABBITMQ_AMQP_PORT: 5672
      RABBITMQ_USER: ci-dummy
      RABBITMQ_PASSWORD: ci-dummy
      RABBITMQ_VHOST: ci_vhost
      MONGO_HOST: localhost
      MONGO_PORT: 27017
      MONGO_USER: ci-dummy
      MONGO_PASSWORD: ci-dummy
      MONGO_DB: ci_audit

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run unit tests
        run: npm test

      - name: Run Jest E2E tests
        run: npm run test:e2e

      # Note: bash test_e2e.sh (full integration tests) is intentionally excluded
      # from CI because it requires all 5 Docker services running (SQL Server,
      # Redis, RabbitMQ, MongoDB, app). Run it locally with: docker compose up -d
