name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Unit & E2E Tests
    runs-on: ubuntu-latest

    env:
      NODE_ENV: test
      # Dummy secret — only used to satisfy the fail-fast guard during test bootstrap.
      # Real deployments must provide a strong secret via environment/secrets manager.
      JWT_SECRET: ci-test-secret-do-not-use-in-production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run unit tests
        run: npm test

      - name: Run Jest E2E tests
        run: npm run test:e2e

      # Note: bash test_e2e.sh (full integration tests) is intentionally excluded
      # from CI because it requires all 5 Docker services running (SQL Server,
      # Redis, RabbitMQ, MongoDB, app). Run it locally with: docker compose up -d
